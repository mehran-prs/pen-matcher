<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Perspective & Vanishing Points</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 350px;
            height: 100vh;
            box-sizing: border-box;
            background-color: rgba(45, 45, 45, 0.2);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            margin-top: 60px;
            border-radius:12px;
            margin-left: 8px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }
        #sidebar.hidden {
            transform: translateX(-100%);
            margin-left: 0;
        }
        #topbar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-control {
            height: 36px;
            margin: 0;
            background-color: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid #555;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }
        .topbar-control:hover {
            border-color: #00ffff;
        }
        .topbar-btn {
            width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        #cubeSelect {
            width: auto;
            min-width: 110px;
            padding: 0 10px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type=range], select {
            width: 100%;
            cursor: pointer;
        }
        .val-input {
            width: 30px;
            background: #444;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 13px;
            text-align: right;
            outline: none;
        }
        .val-input:focus {
            border-color: #00ffff;
        }
        .input-group {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .reset-btn {
            width: 20px;
            height: 20px;
            padding: 0;
            background: #444;
            color: #aaa;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .reset-btn:hover {
            color: #00ffff;
            border-color: #00ffff;
        }
        select {
            background: #444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            outline: none;
            margin-top: 5px;
        }
        .legend {
            margin-top: 20px;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 5px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .color-box {
            width: 15px;
            height: 15px;
            margin-right: 10px;
            border-radius: 3px;
        }
        .line-box {
            width: 15px;
            height: 0px;
            border-top: 2px dashed #00ffff;
            margin-right: 10px;
        }
        h2 { margin-top: 0; font-size: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        p.info { font-size: 13px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        .highlight { color: #00ffff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="topbar">
        <button id="toggleSidebar" class="topbar-control topbar-btn" title="Toggle panel">☰</button>
        <select id="cubeSelect" class="topbar-control" title="Current cube"></select>
        <button id="addCube" class="topbar-control topbar-btn" title="Add cube">+</button>
        <button id="deleteCube" class="topbar-control topbar-btn" title="Delete current cube">🗑</button>
        <button id="randomBox" class="topbar-control topbar-btn" title="Generate a random box">🎲</button>
        <button id="exportScene" class="topbar-control topbar-btn" title="Export to JSON file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
        </button>
        <button id="importScene" class="topbar-control topbar-btn" title="Import from JSON file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1"/><path d="M3 9h17.5a1 1 0 0 1 .96 1.27l-1.7 6A2 2 0 0 1 17.84 18H5a2 2 0 0 1-2-2z"/></svg>
        </button>
        <input type="file" id="importInput" accept="application/json,.json" style="display:none">
    </div>

    <div id="sidebar">
        <h2>Appearance</h2>
        <div class="control-group">
            <select id="viewMode">
                <option value="solid">Solid Object (Real World)</option>
                <option value="wireframe">Wireframe (See-through)</option>
            </select>
        </div>
        <div class="control-group">
            <label style="cursor:pointer;"><span>Show Vanishing Points</span> <input type="checkbox" id="showVPs" checked style="width:auto;cursor:pointer;"></label>
        </div>

        <h2>Camera Setup</h2>
        <p class="info">Use your <b>Mouse Wheel</b> to zoom. <b>Move Z</b> changes how close the camera is to the cube, which dictates the perspective distortion.</p>
        <div class="control-group">
            <label><span>Global Zoom (%)</span> <span class="input-group"><button class="reset-btn" data-for="valZoom" title="Reset to default">↺</button><input type="number" class="val-input" id="valZoom" min="10" max="500" step="5" value="60"></span></label>
            <input type="range" id="zoomOut" min="0.1" max="5" step="0.05" value="0.6">
        </div>
        <div class="control-group">
            <label><span>Global Size (%)</span> <span class="input-group"><button class="reset-btn" data-for="valSize" title="Reset to default">↺</button><input type="number" class="val-input" id="valSize" min="10" max="500" step="5" value="100"></span></label>
            <input type="range" id="globalSize" min="0.1" max="5" step="0.05" value="1">
        </div>

        <h2>Cube Position</h2>
        <p class="info"><b>Click & Drag</b> the canvas to move the cube.</p>
        <div class="control-group">
            <label><span>Move X (Left/Right)</span> <span class="input-group"><button class="reset-btn" data-for="valPosX" title="Reset to default">↺</button><input type="number" class="val-input" id="valPosX" min="-2000" max="2000" value="0"></span></label>
            <input type="range" id="posX" min="-2000" max="2000" value="0">
        </div>
        <div class="control-group">
            <label><span>Move Y (Up/Down)</span> <span class="input-group"><button class="reset-btn" data-for="valPosY" title="Reset to default">↺</button><input type="number" class="val-input" id="valPosY" min="-2000" max="2000" value="-100"></span></label>
            <input type="range" id="posY" min="-2000" max="2000" value="0">
        </div>
        <div class="control-group">
            <label><span>Move Z (Distance/Distortion)</span> <span class="input-group"><button class="reset-btn" data-for="valPosZ" title="Reset to default">↺</button><input type="number" class="val-input" id="valPosZ" min="-350" max="4000" value="0"></span></label>
            <input type="range" id="posZ" min="-350" max="4000" value="0">
        </div>

        <h2>Cube Orientation</h2>
        <div class="control-group">
            <label><span>Rotate X (Pitch °)</span> <span class="input-group"><button class="reset-btn" data-for="valX" title="Reset to default">↺</button><input type="number" class="val-input" id="valX" min="-90" max="90" value="20"></span></label>
            <input type="range" id="rotX" min="-90" max="90" value="0">
        </div>
        <div class="control-group">
            <label><span>Rotate Y (Yaw °)</span> <span class="input-group"><button class="reset-btn" data-for="valY" title="Reset to default">↺</button><input type="number" class="val-input" id="valY" min="-90" max="90" value="30"></span></label>
            <input type="range" id="rotY" min="-90" max="90" value="0">
        </div>
        <div class="control-group">
            <label><span>Rotate Z (Roll °)</span> <span class="input-group"><button class="reset-btn" data-for="valZ" title="Reset to default">↺</button><input type="number" class="val-input" id="valZ" min="-90" max="90" value="0"></span></label>
            <input type="range" id="rotZ" min="-90" max="90" value="0">
        </div>

        <div class="legend">
            <div class="legend-item"><div class="line-box"></div> Horizon Line</div>
            <div class="legend-item"><div class="color-box" style="background: #ff5555;"></div> VP 1 (X-Axis)</div>
            <div class="legend-item"><div class="color-box" style="background: #5555ff;"></div> VP 2 (Y-Axis)</div>
            <div class="legend-item"><div class="color-box" style="background: #55ff55;"></div> VP 3 (Z-Axis)</div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const viewModeSelect = document.getElementById('viewMode');
    const showVPsCheckbox = document.getElementById('showVPs');
    const rotXSlider = document.getElementById('rotX'), rotYSlider = document.getElementById('rotY'), rotZSlider = document.getElementById('rotZ');
    const posXSlider = document.getElementById('posX'), posYSlider = document.getElementById('posY'), posZSlider = document.getElementById('posZ');
    const zoomSlider = document.getElementById('zoomOut');
    const sizeSlider = document.getElementById('globalSize');

    const valX = document.getElementById('valX'), valY = document.getElementById('valY'), valZ = document.getElementById('valZ');
    const valPosX = document.getElementById('valPosX'), valPosY = document.getElementById('valPosY'), valPosZ = document.getElementById('valPosZ');
    const valZoom = document.getElementById('valZoom');
    const valSize = document.getElementById('valSize');

    // Cube Definition
    const vertices = [
        {x: -1, y: -1, z: -1}, {x: 1, y: -1, z: -1}, {x: 1, y: 1, z: -1}, {x: -1, y: 1, z: -1},
        {x: -1, y: -1, z: 1}, {x: 1, y: -1, z: 1}, {x: 1, y: 1, z: 1}, {x: -1, y: 1, z: 1}
    ];

    const faces = [
        { v: [0, 1, 2, 3], n: {x:0, y:0, z:-1}, color: '#444444' },
        { v: [4, 5, 6, 7], n: {x:0, y:0, z:1},  color: '#2d2d2d' },
        { v: [1, 5, 6, 2], n: {x:1, y:0, z:0},  color: '#383838' },
        { v: [0, 4, 7, 3], n: {x:-1, y:0, z:0}, color: '#383838' },
        { v: [3, 2, 6, 7], n: {x:0, y:1, z:0},  color: '#555555' },
        { v: [0, 1, 5, 4], n: {x:0, y:-1, z:0}, color: '#1e1e1e' }
    ];

    const edges = [
        [0, 1, 0], [1, 2, 1], [2, 3, 0], [3, 0, 1], 
        [4, 5, 0], [5, 6, 1], [6, 7, 0], [7, 4, 1], 
        [0, 4, 2], [1, 5, 2], [2, 6, 2], [3, 7, 2]  
    ];

    // --- MULTI-CUBE STATE ---
    // Each cube stores its own position + orientation. Zoom stays global (camera).
    function readControls() {
        return {
            rotX: parseFloat(rotXSlider.value), rotY: parseFloat(rotYSlider.value), rotZ: parseFloat(rotZSlider.value),
            posX: parseFloat(posXSlider.value), posY: parseFloat(posYSlider.value), posZ: parseFloat(posZSlider.value)
        };
    }
    function loadCubeToControls(c) {
        rotXSlider.value = c.rotX; rotYSlider.value = c.rotY; rotZSlider.value = c.rotZ;
        posXSlider.value = c.posX; posYSlider.value = c.posY; posZSlider.value = c.posZ;
    }
    function saveControlsToCube(c) {
        c.rotX = parseFloat(rotXSlider.value); c.rotY = parseFloat(rotYSlider.value); c.rotZ = parseFloat(rotZSlider.value);
        c.posX = parseFloat(posXSlider.value); c.posY = parseFloat(posYSlider.value); c.posZ = parseFloat(posZSlider.value);
    }

    let cubes = [ readControls() ];
    let currentCubeIndex = 0;

    const cubeSelect = document.getElementById('cubeSelect');
    function rebuildCubeSelect() {
        cubeSelect.innerHTML = '';
        cubes.forEach((c, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = 'Cube ' + (i + 1);
            cubeSelect.appendChild(opt);
        });
        cubeSelect.value = currentCubeIndex;
    }

    // Save the panel's current edits into the active cube, then redraw everything.
    function onControlChange() {
        saveControlsToCube(cubes[currentCubeIndex]);
        draw();
    }

    function pointInPolygon(x, y, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
            const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    // Return the index of the front-most cube under a screen point, or -1.
    function pickCube(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const px = clientX - rect.left;
        const py = clientY - rect.top;
        const zoom = parseFloat(zoomSlider.value);
        const focal = 600;
        const cx = canvas.width / 2, cy = canvas.height / 2;

        let best = -1, bestDepth = Infinity;
        for (let ci = 0; ci < cubes.length; ci++) {
            const { projectedVertices, transformedVertices } = projectCubeVertices(cubes[ci], cx, cy, zoom, focal);
            for (let f of faces) {
                const poly = f.v.map(i => projectedVertices[i]);
                if (pointInPolygon(px, py, poly)) {
                    let z = 0;
                    for (let i of f.v) z += transformedVertices[i].z;
                    z /= f.v.length;
                    if (z < bestDepth) { bestDepth = z; best = ci; }
                }
            }
        }
        return best;
    }

    // Make the cube under the pointer the active one (if any).
    function selectCubeAt(clientX, clientY) {
        const idx = pickCube(clientX, clientY);
        if (idx !== -1 && idx !== currentCubeIndex) {
            saveControlsToCube(cubes[currentCubeIndex]);
            currentCubeIndex = idx;
            cubeSelect.value = idx;
            loadCubeToControls(cubes[idx]);
            draw();
        }
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        draw();
    }
    window.addEventListener('resize', resize);

    function rotate3D(x, y, z, pitch, yaw, roll) {
        const cx = Math.cos(pitch), sx = Math.sin(pitch);
        const cy = Math.cos(yaw),   sy = Math.sin(yaw);
        const cz = Math.cos(roll),  sz = Math.sin(roll);

        let x1 = x * cy + z * sy, y1 = y, z1 = -x * sy + z * cy;
        let x2 = x1, y2 = y1 * cx - z1 * sx, z2 = y1 * sx + z1 * cx;
        let x3 = x2 * cz - y2 * sz, y3 = x2 * sz + y2 * cz, z3 = z2;

        return { x: x3, y: y3, z: z3 };
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const zoom = parseFloat(zoomSlider.value);
        const viewMode = viewModeSelect.value;
        const focal = 600; // Hardcoded static base lens so zoom handles all scaling

        // Sync number inputs for the current cube (skip the one being edited to avoid cursor jumps)
        const active = document.activeElement;
        if (active !== valX) valX.value = rotXSlider.value;
        if (active !== valY) valY.value = rotYSlider.value;
        if (active !== valZ) valZ.value = rotZSlider.value;
        if (active !== valPosX) valPosX.value = Math.round(parseFloat(posXSlider.value));
        if (active !== valPosY) valPosY.value = Math.round(parseFloat(posYSlider.value));
        if (active !== valPosZ) valPosZ.value = Math.round(parseFloat(posZSlider.value));
        if (active !== valZoom) valZoom.value = Math.round(zoom * 100);
        if (active !== valSize) valSize.value = Math.round(parseFloat(sizeSlider.value) * 100);

        const cx = canvas.width / 2, cy = canvas.height / 2;

        // HORIZON LINE (shared by all cubes)
        ctx.beginPath();
        ctx.moveTo(0, cy);
        ctx.lineTo(canvas.width, cy);
        ctx.strokeStyle = '#00ffff';
        ctx.setLineDash([10, 10]);
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#00ffff';
        ctx.font = '14px Arial';
        ctx.fillText("Horizon Line", 20, cy - 10);

        // Draw every cube using its own stored state
        const showVPs = showVPsCheckbox.checked;
        for (let c of cubes) {
            drawCube(c, cx, cy, zoom, viewMode, focal, showVPs);
        }
    }

    // Project a cube's 8 vertices to screen space (shared by drawing and hit-testing)
    function projectCubeVertices(state, cx, cy, zoom, focal) {
        const pitch = state.rotX * (Math.PI / 180);
        const yaw = state.rotY * (Math.PI / 180);
        const roll = state.rotZ * (Math.PI / 180);
        const pX = state.posX, pY = state.posY, pZ = state.posZ;
        const cubeSize = 100, cameraZ = 4;
        // Global size scales the cube's real 3D dimensions while the camera
        // distance (cameraZ * cubeSize) stays fixed, so bigger cubes also get
        // more perspective distortion — unlike zoom, which scales projection.
        const sizeScale = parseFloat(sizeSlider.value);
        const vScale = cubeSize * sizeScale;

        const projectedVertices = [];
        const transformedVertices = [];
        for (let v of vertices) {
            let rotated = rotate3D(v.x * vScale, v.y * vScale, v.z * vScale, pitch, yaw, roll);
            let translated = { x: rotated.x + pX, y: rotated.y + pY, z: rotated.z + pZ + (cameraZ * cubeSize) };
            transformedVertices.push(translated);
            projectedVertices.push({
                x: cx + (translated.x / translated.z) * focal * zoom,
                y: cy - (translated.y / translated.z) * focal * zoom
            });
        }
        return { projectedVertices, transformedVertices };
    }

    function drawCube(state, cx, cy, zoom, viewMode, focal, showVPs = true) {
        const pitch = state.rotX * (Math.PI / 180);
        const yaw = state.rotY * (Math.PI / 180);
        const roll = state.rotZ * (Math.PI / 180);

        // VPs - Scaled by Zoom
        const axisX = rotate3D(1, 0, 0, pitch, yaw, roll);
        const axisY = rotate3D(0, 1, 0, pitch, yaw, roll);
        const axisZ = rotate3D(0, 0, 1, pitch, yaw, roll);

        const vps = [
            { x: cx + (axisX.x / axisX.z) * focal * zoom, y: cy - (axisX.y / axisX.z) * focal * zoom, valid: Math.abs(axisX.z) > 0.01, color: '#ff5555' },
            { x: cx + (axisY.x / axisY.z) * focal * zoom, y: cy - (axisY.y / axisY.z) * focal * zoom, valid: Math.abs(axisY.z) > 0.01, color: '#5555ff' },
            { x: cx + (axisZ.x / axisZ.z) * focal * zoom, y: cy - (axisZ.y / axisZ.z) * focal * zoom, valid: Math.abs(axisZ.z) > 0.01, color: '#55ff55' }
        ];

        const vpNames=['X','Y','Z']

        // Vertices - Scaled by Zoom
        const { projectedVertices, transformedVertices } = projectCubeVertices(state, cx, cy, zoom, focal);

        // Back-face Culling
        let visibleFaces = [];
        for (let f of faces) {
            let rn = rotate3D(f.n.x, f.n.y, f.n.z, pitch, yaw, roll);
            let faceCenter = {x: 0, y: 0, z: 0};
            for(let vi of f.v) {
                faceCenter.x += transformedVertices[vi].x; faceCenter.y += transformedVertices[vi].y; faceCenter.z += transformedVertices[vi].z;
            }
            faceCenter.x /= 4; faceCenter.y /= 4; faceCenter.z /= 4;
            
            let dot = (rn.x * faceCenter.x) + (rn.y * faceCenter.y) + (rn.z * faceCenter.z);
            f.zDepth = faceCenter.z;

            if (dot < 0 || viewMode === 'wireframe') visibleFaces.push(f);
        }

        visibleFaces.sort((a, b) => b.zDepth - a.zDepth);

        // Find visible edges
        let visibleEdgesList = [];
        for (let e of edges) {
            let isVisible = false;
            if (viewMode === 'wireframe') isVisible = true;
            else {
                for (let f of visibleFaces) {
                    if (f.v.includes(e[0]) && f.v.includes(e[1])) { isVisible = true; break; }
                }
            }
            if (isVisible) visibleEdgesList.push(e);
        }

        // Draw Guide lines
        if (showVPs) {
            ctx.lineWidth = 1;
            for (let e of visibleEdgesList) {
                let p1 = projectedVertices[e[0]];
                let vp = vps[e[2]];
                if (vp.valid) {
                    ctx.beginPath(); ctx.moveTo(vp.x, vp.y); ctx.lineTo(p1.x, p1.y);
                    ctx.strokeStyle = vp.color + '44'; ctx.stroke();
                }
            }
        }

        // Draw Solid Faces
        if (viewMode === 'solid') {
            for (let f of visibleFaces) {
                ctx.beginPath();
                for (let i = 0; i < f.v.length; i++) {
                    let p = projectedVertices[f.v[i]];
                    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();
                ctx.fillStyle = f.color; ctx.fill();
            }
        }

        // Draw Edges
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#ffffff';
        for (let e of visibleEdgesList) {
            let p1 = projectedVertices[e[0]], p2 = projectedVertices[e[1]];
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }

        // Draw VPs
        if (showVPs) {
            for (let i = 0; i < vps.length; i++) {
                let vp = vps[i];
                if (vp.valid) {
                    ctx.beginPath(); ctx.arc(vp.x, vp.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = vp.color; ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial';
                    ctx.fillText(`${vpNames[i]}-VP`, vp.x + 10, vp.y - 10);
                }
            }
        }
    }

    // --- MOUSE INTERACTIONS ---
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    function startDrag(x, y) {
        isDragging = true;
        lastMouseX = x;
        lastMouseY = y;
    }

    function moveDrag(x, y) {
        if (!isDragging) return;

        let dx = x - lastMouseX;
        let dy = y - lastMouseY;
        lastMouseX = x;
        lastMouseY = y;

        let zDepth = parseFloat(posZSlider.value) + 400; 
        let focal = 600;
        let zoom = parseFloat(zoomSlider.value);
        
        // Correct 3D tracking math
        let moveX3D = (dx / zoom) * (zDepth / focal);
        let moveY3D = -(dy / zoom) * (zDepth / focal); 

        posXSlider.value = parseFloat(posXSlider.value) + moveX3D;
        posYSlider.value = parseFloat(posYSlider.value) + moveY3D;
        onControlChange();
    }

    canvas.addEventListener('mousedown', (e) => {
        selectCubeAt(e.clientX, e.clientY);
        startDrag(e.clientX, e.clientY);
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    window.addEventListener('mousemove', (e) => {
        moveDrag(e.clientX, e.clientY);
    });

    // --- TOUCH INTERACTIONS ---
    let lastPinchDist = null;

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            selectCubeAt(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2) {
            isDragging = false;
            lastPinchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1) {
            moveDrag(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2 && lastPinchDist !== null) {
            let dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            let currentZoom = parseFloat(zoomSlider.value);
            let newZoom = currentZoom * (dist / lastPinchDist);
            if (newZoom < 0.1) newZoom = 0.1;
            if (newZoom > 5) newZoom = 5;
            zoomSlider.value = newZoom;
            lastPinchDist = dist;
            draw();
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
            isDragging = false;
            lastPinchDist = null;
        } else if (e.touches.length === 1) {
            lastPinchDist = null;
            startDrag(e.touches[0].clientX, e.touches[0].clientY);
        }
    });

    // Mouse Wheel Zoom
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        let currentZoom = parseFloat(zoomSlider.value);
        let newZoom = currentZoom - (e.deltaY * 0.001);
        if (newZoom < 0.1) newZoom = 0.1;
        if (newZoom > 5) newZoom = 5;
        zoomSlider.value = newZoom;
        draw();
    });

    // Attach events. Per-cube controls write into the active cube; zoom is global.
    [rotXSlider, rotYSlider, rotZSlider, posXSlider, posYSlider, posZSlider].forEach(slider => {
        slider.addEventListener('input', onControlChange);
    });
    zoomSlider.addEventListener('input', draw);
    sizeSlider.addEventListener('input', draw);
    viewModeSelect.addEventListener('change', draw);
    showVPsCheckbox.addEventListener('change', draw);

    // Number inputs drive their sliders (zoom input is in percent)
    const numberInputPairs = [
        [valX, rotXSlider, 1, true], [valY, rotYSlider, 1, true], [valZ, rotZSlider, 1, true],
        [valPosX, posXSlider, 1, true], [valPosY, posYSlider, 1, true], [valPosZ, posZSlider, 1, true],
        [valZoom, zoomSlider, 0.01, false],
        [valSize, sizeSlider, 0.01, false]
    ];
    numberInputPairs.forEach(([input, slider, factor, perCube]) => {
        input.addEventListener('input', () => {
            if (input.value === '' || input.value === '-') return;
            slider.value = parseFloat(input.value) * factor;
            if (perCube) onControlChange(); else draw();
        });
    });

    // Reset buttons restore each control to its default value
    const resetMap = {};
    numberInputPairs.forEach(([input, slider, factor, perCube]) => {
        resetMap[input.id] = { slider, perCube };
    });
    document.querySelectorAll('.reset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const entry = resetMap[btn.dataset.for];
            if (!entry) return;
            entry.slider.value = entry.slider.defaultValue;
            if (entry.perCube) onControlChange(); else draw();
        });
    });

    // Sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggleSidebar');
    toggleSidebarBtn.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
    });

    // --- CUBE MANAGEMENT ---
    cubeSelect.addEventListener('change', () => {
        currentCubeIndex = parseInt(cubeSelect.value, 10);
        loadCubeToControls(cubes[currentCubeIndex]);
        draw();
    });

    document.getElementById('addCube').addEventListener('click', () => {
        saveControlsToCube(cubes[currentCubeIndex]);
        // Copy the current cube and offset it so the new one is visible
        const base = cubes[currentCubeIndex];
        const newCube = { ...base, posX: base.posX + 250 };
        cubes.push(newCube);
        currentCubeIndex = cubes.length - 1;
        rebuildCubeSelect();
        loadCubeToControls(newCube);
        draw();
    });

    document.getElementById('deleteCube').addEventListener('click', () => {
        if (cubes.length <= 1) return; // always keep at least one cube
        cubes.splice(currentCubeIndex, 1);
        if (currentCubeIndex >= cubes.length) currentCubeIndex = cubes.length - 1;
        rebuildCubeSelect();
        loadCubeToControls(cubes[currentCubeIndex]);
        draw();
    });

    // --- RANDOM BOX ---
    // Generates a single random box. Behaves like an import: replaces all existing cubes.
    document.getElementById('randomBox').addEventListener('click', () => {
        const rand = (min, max) => Math.random() * (max - min) + min;
        const newCube = {
            rotX: 0,
            rotY: Math.random() < 0.5 ? Math.round(rand(-60, 60)) : 0,
            rotZ: 0,
            posX: Math.round(rand(-600, 600)),
            posY: Math.round(rand(-400, 400)),
            posZ: 0
        };
        cubes = [newCube];
        currentCubeIndex = 0;
        rebuildCubeSelect();
        loadCubeToControls(cubes[currentCubeIndex]);
        draw();
    });

    // --- SAVE / LOAD (JSON FILE) ---
    document.getElementById('exportScene').addEventListener('click', () => {
        saveControlsToCube(cubes[currentCubeIndex]);
        const data = {
            version: 1,
            zoom: parseFloat(zoomSlider.value),
            size: parseFloat(sizeSlider.value),
            viewMode: viewModeSelect.value,
            currentCubeIndex,
            cubes
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'perspective-scene.json';
        a.click();
        URL.revokeObjectURL(url);
    });

    const importInput = document.getElementById('importInput');
    document.getElementById('importScene').addEventListener('click', () => importInput.click());
    importInput.addEventListener('change', () => {
        const file = importInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const data = JSON.parse(reader.result);
                if (!Array.isArray(data.cubes) || data.cubes.length === 0) {
                    throw new Error('No cubes found in file');
                }
                cubes = data.cubes.map(c => ({
                    rotX: parseFloat(c.rotX) || 0, rotY: parseFloat(c.rotY) || 0, rotZ: parseFloat(c.rotZ) || 0,
                    posX: parseFloat(c.posX) || 0, posY: parseFloat(c.posY) || 0, posZ: parseFloat(c.posZ) || 0
                }));
                currentCubeIndex = Math.min(Math.max(parseInt(data.currentCubeIndex, 10) || 0, 0), cubes.length - 1);
                if (typeof data.zoom === 'number') zoomSlider.value = data.zoom;
                if (typeof data.size === 'number') sizeSlider.value = data.size;
                if (data.viewMode) viewModeSelect.value = data.viewMode;
                rebuildCubeSelect();
                loadCubeToControls(cubes[currentCubeIndex]);
                draw();
            } catch (err) {
                alert('Could not load file: ' + err.message);
            }
            importInput.value = '';
        };
        reader.readAsText(file);
    });

    // Initial draw
    rebuildCubeSelect();
    resize();
</script>

</body>
</html>
